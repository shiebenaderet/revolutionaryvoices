name = "rv-sync"
main = "worker.js"
compatibility_date = "2026-06-13"

# Binds the D1 database to env.DB inside the Worker
[[d1_databases]]
binding = "DB"
database_name = "revolutionary-voices"
database_id = "5d15a34e-665a-4ff5-8579-4a3141ee51a5"

# Which site is allowed to call this Worker
[vars]
ALLOW_ORIGIN = "https://voices.mrbsocialstudies.org,https://voices.shieb.com"

# TEACHER_KEY is a secret — do NOT put it here. Set it with:
#   npx wrangler secret put TEACHER_KEY
